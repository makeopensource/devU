version: '3.8'
services:
  db:
    # Runs the PostgreSQL database
    image: postgres
    environment:
      POSTGRES_DB: typescript_api
      POSTGRES_USER: typescript_user
      POSTGRES_PASSWORD: password
    #    ports:
    #      - '5432:5432'
    expose:
      - '5432'
  web:
    # Runs the API
    build: devU-api
    environment:
      WAIT_HOSTS: db:5432
    depends_on:
      db:
        condition: service_started
    # You can mount the config to a another folder for local testing
    # volumes:
    #   - ./devU-api/config:/app/config-tmp

      #   # Depends on config
      # config:
      #   condition: service_completed_successfully
    ports:
      - '3001:3001'
  client:
    # Builds the front end and exports static files to ./dist
    build:
      dockerfile: ../Dockerfile-client
      context: devU-client
    volumes:
      - ./dist:/out
  nginx:
    # Hosts the front end static files from ./dist/local thorough a web server
    build:
      context: .
      dockerfile: Dockerfile-nginx
    volumes:
      - ./dist/local:/usr/share/nginx/html
    ports:
      - "9000:80"
  minio:
    image: minio/minio
    #    ports:
    #      - '9002:9000'
    #      - '9001:9001'
    expose:
      - '9000'
    #    volumes:
    #      - /tmp/data:/data
    environment:
      MINIO_ROOT_USER: typescript_user
      MINIO_ROOT_PASSWORD: changeMe
    command: server /data --console-address ":9001"

